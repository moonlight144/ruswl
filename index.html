<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiddify</title>
    
    <!-- Tab Icon -->
    <link rel="icon" type="image/png" href="./logo1.png">
    
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --m3-surface: #fef7ff;
            --m3-surface-container: #f3edf7;
            --m3-primary: #6750a4;
            --m3-on-primary: #ffffff;
            --m3-on-surface: #1d1b20;
            --m3-secondary-container: #e8def8;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--m3-surface);
            color: var(--m3-on-surface);
            margin: 0; padding: 0; display: flex; justify-content: center;
        }

        .container { max-width: 500px; width: 100%; padding: 24px; }

        header { margin-top: 48px; margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

        .logo { width: 96px; height: 96px; object-fit: contain; border-radius: 28px; }

        h1 { font-size: 32px; font-weight: 400; margin: 0; letter-spacing: -0.5px; }

        .list { display: flex; flex-direction: column; gap: 12px; }

        .item {
            background-color: var(--m3-surface-container);
            border-radius: 28px; padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s ease;
        }

        .item:active { transform: scale(0.97); background-color: var(--m3-secondary-container); }

        .label { font-size: 15px; font-weight: 500; color: var(--m3-on-surface); max-width: 65%; word-wrap: break-word; }

        .btn {
            background-color: var(--m3-primary);
            color: var(--m3-on-primary);
            text-decoration: none;
            padding: 10px 24px; border-radius: 20px;
            font-size: 14px; font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="./logo.png" alt="Hiddify" class="logo">
        <h1>Hiddify</h1>
    </header>

    <div class="list">
        <div class="item">
            <span class="label">Rus Mobile 1</span>
            <a href="hiddify://import/https://raw.githubusercontent.com/Kirillo4ka/eavevpn-configs/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt" class="btn">Импорт</a>
        </div>

        <div class="item">
            <span class="label">Rus Mobile 2</span>
            <a href="hiddify://import/https://raw.githubusercontent.com/Kirillo4ka/eavevpn-configs/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" class="btn">Импорт</a>
        </div>

        <div class="item">
            <span class="label">WHITE-CIDR-RU-all</span>
            <a href="hiddify://import/https://raw.githubusercontent.com/Kirillo4ka/eavevpn-configs/refs/heads/main/WHITE-CIDR-RU-all.txt" class="btn">Импорт</a>
        </div>

        <div class="item">
            <span class="label">WHITE-CIDR-RU-checked</span>
            <a href="hiddify://import/https://raw.githubusercontent.com/Kirillo4ka/eavevpn-configs/refs/heads/main/WHITE-CIDR-RU-checked.txt" class="btn">Импорт</a>
        </div>

        <div class="item">
            <span class="label">WHITE-SNI-RU-all</span>
            <a href="hiddify://import/https://raw.githubusercontent.com/Kirillo4ka/eavevpn-configs/refs/heads/main/WHITE-SNI-RU-all.txt" class="btn">Импорт</a>
        </div>
    </div>
</div>

</body>
</html>
