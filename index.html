<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои Конфиги Hiddify</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f4f4f9; }
        .config-card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 10px 15px; background: #6200ee; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Список конфигов Hiddify</h1>
    
    <div class="config-card">
        <h3>Сервер Германия (VLESS)</h3>
        <p>Быстрый сервер для видео.</p>
        <a href="hiddify://import/ТВОЯ_ССЫЛКА_ИЛИ_КОНФИГ_ЗДЕСЬ" class="btn">Добавить в Hiddify</a>
    </div>

    <div class="config-card">
        <h3>Подписка (Subscription)</h3>
        <p>Автообновляемый список серверов.</p>
        <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">Импортировать подписку</a>
    </div>
</body>
</html>
