    <style>
        :root { --m3-surface: #000; --m3-primary: #0066ff; --m3-secondary: #00c2ff; }
        body { font-family: 'Roboto', sans-serif; background-color: #000; color: #e2e2e6; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; position: relative; }
        
        /* Анимация Win11 */
        .bg-blur { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; filter: blur(90px); }
        .blob { position: absolute; border-radius: 50%; opacity: 0.4; mix-blend-mode: screen; animation: win11-flow 14s infinite alternate ease-in-out; }
        .blob-1 { width: 90%; height: 90%; background: radial-gradient(circle, var(--m3-primary) 0%, transparent 70%); top: -20%; left: -10%; }
        .blob-2 { width: 85%; height: 85%; background: radial-gradient(circle, var(--m3-secondary) 0%, transparent 75%); bottom: -15%; right: -10%; animation-delay: -3s; }
        @keyframes win11-flow { 0% { transform: translate(0,0) scale(1); border-radius: 40% 60% 70% 30%; } 100% { transform: translate(5%, 5%) scale(1.1); border-radius: 30% 60% 30% 70%; } }

        .container { position: relative; z-index: 10; max-width: 480px; width: 100%; padding: 24px; }
        header { margin-top: 40px; text-align: center; margin-bottom: 30px; }
        .logo { width: 100px; height: 100px; border-radius: 50px; border: 2px solid var(--m3-primary); box-shadow: 0 0 30px var(--m3-primary); }
        
        .instruction-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 24px; margin-bottom: 20px; }
        .step { font-size: 14px; margin-bottom: 12px; color: #c4c6cf; line-height: 1.5; }
        .step b { color: #fff; }

        /* Список который появится сам */
        #dynamic-list { display: flex; flex-direction: column; gap: 12px; min-height: 100px; }
        .item { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 20px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .btn { background: var(--m3-primary); color: #fff; text-decoration: none; padding: 8px 16px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .label { font-size: 13px; color: #fff; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
