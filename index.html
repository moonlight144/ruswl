<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiddify</title>
    
    <!-- Favicon: Logo in the browser tab -->
    <link rel="icon" type="image/png" href="ССЫЛКА_НА_ТВОЙ_ЛОГОТИП">
    
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --m3-surface: #fef7ff;
            --m3-surface-container: #f3edf7;
            --m3-primary: #6750a4;
            --m3-on-primary: #ffffff;
            --m3-on-surface: #1d1b20;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--m3-surface);
            color: var(--m3-on-surface);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            padding: 24px;
        }

        header {
            margin-top: 40px;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        /* Logo styling */
        .logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 400;
            margin: 0;
        }

        .list {
            display: flex; flex-direction: column; gap: 12px;
        }

        .item {
            background-color: var(--m3-surface-container);
            border-radius: 28px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label {
            font-size: 16px;
            font-weight: 500;
        }

        .btn {
            background-color: var(--m3-primary);
            color: var(--m3-on-primary);
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <!-- Replace the URL below with your logo link -->
        <img src="ССЫЛКА_НА_ТВОЙ_ЛОГОТИП" alt="Logo" class="logo">
        <h1>Hiddify</h1>
    </header>

    <div class="list">
        <div class="item">
            <span class="label">Rus Mobile 1</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">Импорт</a>
        </div>

        <div class="item">
            <span class="label">Rus Mobile 2</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">Импорт</a>
        </div>

        <div class="item">
            <span class="label">WHITE-CIDR-RU-all</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">Импорт</a>
        </div>

        <div class="item">
            <span class="label">WHITE-CIDR-RU-checked</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">Импорт</a>
        </div>

        <div class="item">
            <span class="label">WHITE-SNI-RU-all</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">Импорт</a>
        </div>
    </div>
</div>

</body>
</html>
