<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiddify</title>
    
    <link rel="icon" type="image/png" href="./logo1.png">
    
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        /* ПОЛНОСТЬЮ НОВАЯ СИНЯЯ ПАЛИТРА */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #000000; /* Чистый черный фон */
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            width: 100%;
            padding: 24px;
        }

        header {
            margin-top: 50px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* ЛОГОТИП С ЖИРНОЙ СИНЕЙ ТЕНЬЮ */
        .logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.4); /* Синяя тень */
            border: 2px solid #0055ff;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0;
            color: #0084ff; /* Ярко-синий заголовок */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* КАРТОЧКИ В ТЕМНО-СИНЕМ СТИЛЕ */
        .item {
            background-color: #1a1a1a;
            border-radius: 20px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        .item:active {
            transform: scale(0.95);
            background-color: #252525;
        }

        .label {
            font-size: 15px;
            font-weight: 500;
            color: #e0e0e0;
        }

        /* КНОПКИ: ЯРКО-СИНИЙ ЦВЕТ */
        .btn {
            background-color: #0066ff; /* Кнопка синяя */
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3); /* Тень кнопки */
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #0052cc;
            box-shadow: 0 6px 20px rgba(0, 102, 255, 0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="./logo.png" alt="Hiddify" class="logo">
        <h1>Hiddify</h1>
    </header>

    <div class="list">
        <div class="item">
            <span class="label">Rus Mobile 1</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">ИМПОРТ</a>
        </div>

        <div class="item">
            <span class="label">Rus Mobile 2</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">ИМПОРТ</a>
        </div>

        <div class="item">
            <span class="label">WHITE-CIDR-RU-all</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">ИМПОРТ</a>
        </div>

        <div class="item">
            <span class="label">WHITE-CIDR-RU-checked</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">ИМПОРТ</a>
        </div>

        <div class="item">
            <span class="label">WHITE-SNI-RU-all</span>
            <a href="hiddify://import/https://raw.githubusercontent.com" class="btn">ИМПОРТ</a>
        </div>
    </div>
</div>

</body>
</html>
